name: Ex07-Solution

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: tiny-health-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          IMAGE_TAG=$(date -u +%Y%m%d)-${{ github.run_id }}
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Show image tag
        run: echo "Deploying image $IMAGE_NAME:$IMAGE_TAG"

      - name: Start container
        run: |
          docker rm -f tiny-health-container || true
          docker run -d \
            --name tiny-health-container \
            -p 8000:8000 \
            $IMAGE_NAME:$IMAGE_TAG

      - name: Show running containers
        run: docker ps

      - name: Print /health response body
        run: |
          sleep 5
          curl http://127.0.0.1:8000/health

      - name: Smoke test deployed app
        run: curl --fail http://127.0.0.1:8000/health