name: CI Final Workflow

on:
  pull_request:
    branches:
      - main

jobs:

  pipeline:
    name: Verify + Build (PR Only)
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: tiny-health-app
      IMAGE_TAR: tiny-health-app.tar
      ARTIFACT_NAME: tiny-health-app-image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -p "test*.py" -v

      - name: Wait 5 minutes (demo only)
        run: |
          echo "Sleeping for 5 minutes..."
          sleep 300

      - name: Build Docker image
        run: docker build -t ${IMAGE_NAME}:latest .

      - name: Save Docker image
        run: docker save ${IMAGE_NAME}:latest -o ${IMAGE_TAR}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.IMAGE_TAR }}