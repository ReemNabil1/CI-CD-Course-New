name: CI and ECR Push Workflow

on:
  pull_request:
    branches:
      - main

jobs:
  pipeline:
    name: Verify + AutoFix + Scan + Build + Push
    runs-on: ubuntu-latest

    env:
      ECR_REPOSITORY: ci-cd
      LOCAL_IMAGE_NAME: tiny-health-app

    steps:
      # ---------------------------------
      # Checkout
      # ---------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------
      # Setup Python
      # ---------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ---------------------------------
      # Install base tools
      # ---------------------------------
      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # ---------------------------------
      # Install dependencies
      # ---------------------------------
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ---------------------------------
      # Run Tests (first gate)
      # ---------------------------------
      - name: Run tests
        run: python -m unittest discover -s tests -v

      # ---------------------------------
      # Try auto upgrade dependencies
      # ---------------------------------
      - name: Auto upgrade dependencies (best effort fix)
        run: |
          if [ -f requirements.txt ]; then
            pip install pip-review
            pip-review --auto
            pip freeze > requirements.txt
          fi

      # ---------------------------------
      # Re-run tests after upgrade
      # ---------------------------------
      - name: Run tests after upgrade
        run: python -m unittest discover -s tests -v

      # ---------------------------------
      # Build Docker Image
      # ---------------------------------
      - name: Build Docker image
        run: docker build --pull -t tiny-health-app:latest .

      # ---------------------------------
      # Trivy Scan (Security Gate)
      # ---------------------------------
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tiny-health-app:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          scanners: vuln

      # ---------------------------------
      # AWS Credentials
      # ---------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ECRACCESS }}
          aws-secret-access-key: ${{ secrets.ECRSECRETACCESS }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ---------------------------------
      # Login to ECR
      # ---------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------
      # Generate Tag
      # ---------------------------------
      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      # ---------------------------------
      # Tag + Push
      # ---------------------------------
      - name: Tag and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.image_tag }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/${ECR_REPOSITORY}:$IMAGE_TAG"

          docker tag tiny-health-app:latest $IMAGE_URI
          docker push $IMAGE_URI