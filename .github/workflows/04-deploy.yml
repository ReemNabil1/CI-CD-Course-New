name: 04 Deploy Workflow

on:
  workflow_run:
    workflows: ["[FinalCI]"]
    types:
      - completed

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR: tiny-health-app.tar
  ARTIFACT_NAME: tiny-health-app-image
  CONTAINER_NAME: tiny-health-container
  APP_PORT: "8000"

jobs:
  deploy-package:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: artifact

      - name: Show files
        run: ls -R artifact

      - name: Load Docker image
        run: docker load --input artifact/${{ env.IMAGE_TAR }}

      - name: Run container
        run: |
          docker run -d \
            --name "${CONTAINER_NAME}" \
            -p "${APP_PORT}:8000" \
            "${IMAGE_NAME}:latest"

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl --fail --silent http://127.0.0.1:${APP_PORT}/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true