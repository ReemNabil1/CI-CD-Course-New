name: CI PR Workflow

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies (if any)
        run: |
          python -m pip install --upgrade pip

      - name: Run tests
        run: python -m unittest discover -s tests -v